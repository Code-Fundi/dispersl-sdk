name: Python SDK CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'python-sdk/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'python-sdk/**'
      - '.github/workflows/python-ci.yml'
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd python-sdk
          pip install -e .[dev]
      
      - name: Run ruff linting
        run: |
          cd python-sdk
          ruff check src/ tests/ --output-format=github
      
      - name: Run ruff format check
        run: |
          cd python-sdk
          ruff format --check src/ tests/
      
      - name: Run mypy type checking
        run: |
          cd python-sdk
          mypy src/ --strict --show-error-codes
      
      - name: Run pylint
        run: |
          cd python-sdk
          pylint src/ --output-format=colorized

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    env:
      # Dynamic API URL for testing
      DISPERSL_API_URL: ${{ secrets.TEST_API_URL || 'http://localhost:3000' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd python-sdk
          pip install -e .[dev]
      
      - name: Run unit tests
        run: |
          cd python-sdk
          pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term
        env:
          DISPERSL_API_URL: ${{ env.DISPERSL_API_URL }}
      
      - name: Run integration tests (if API available)
        if: env.DISPERSL_API_URL != 'http://localhost:3000' || github.event_name == 'push'
        run: |
          cd python-sdk
          pytest tests/integration/ -v --cov=src --cov-append --cov-report=xml --cov-report=term || echo "Integration tests skipped"
        env:
          DISPERSL_API_URL: ${{ env.DISPERSL_API_URL }}
          DISPERSL_API_KEY: ${{ secrets.DISPERSL_API_KEY }}
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./python-sdk/coverage.xml
          flags: python-sdk-${{ matrix.os }}-${{ matrix.python-version }}
          name: python-sdk-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [lint-and-type-check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build dependencies
        run: |
          cd python-sdk
          pip install build twine
      
      - name: Build package
        run: |
          cd python-sdk
          python -m build
      
      - name: Check package with twine
        run: |
          cd python-sdk
          twine check dist/*
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python-sdk/dist/
          retention-days: 7

  publish-test-pypi:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/dispersl-sdk
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      
      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    needs: [build]
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dispersl-sdk
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
