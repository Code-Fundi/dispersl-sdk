name: TypeScript SDK CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'typescript-sdk/**'
      - '.github/workflows/typescript-ci.yml'
  pull_request:
    paths:
      - 'typescript-sdk/**'
      - '.github/workflows/typescript-ci.yml'
  release:
    types: [published]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: cd typescript-sdk && pnpm install
      
      - name: Run ESLint
        run: cd typescript-sdk && pnpm run lint
      
      - name: Run TypeScript compiler check
        run: cd typescript-sdk && pnpm run type-check
      
      - name: Check formatting (if prettier configured)
        run: cd typescript-sdk && npx prettier --check "src/**/*.ts" || echo "Prettier not configured"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20', '21']
    env:
      # Dynamic API URL for testing
      DISPERSL_API_URL: ${{ secrets.TEST_API_URL || 'http://localhost:3000' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: cd typescript-sdk && pnpm install
      
      - name: Run unit tests
        run: cd typescript-sdk && pnpm run test:coverage
        env:
          DISPERSL_API_URL: ${{ env.DISPERSL_API_URL }}
      
      - name: Run integration tests (if API available)
        if: env.DISPERSL_API_URL != 'http://localhost:3000' || github.event_name == 'push'
        run: cd typescript-sdk && pnpm run test:integration || echo "Integration tests skipped"
        env:
          DISPERSL_API_URL: ${{ env.DISPERSL_API_URL }}
          DISPERSL_API_KEY: ${{ secrets.DISPERSL_API_KEY }}
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./typescript-sdk/coverage/coverage-final.json
          flags: typescript-sdk-${{ matrix.os }}-${{ matrix.node-version }}
          name: typescript-sdk-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [lint-and-type-check, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: cd typescript-sdk && pnpm install
      
      - name: Build package
        run: cd typescript-sdk && pnpm run build
      
      - name: Check build output
        run: |
          cd typescript-sdk
          test -f dist/index.js || (echo "Build failed: dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "Build failed: dist/index.d.ts not found" && exit 1)
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: |
            typescript-sdk/dist/
            typescript-sdk/package.json
            typescript-sdk/README.md
          retention-days: 7

  publish-npm-test:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: npm-test
      url: https://www.npmjs.com/package/@dispersl/sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: typescript-dist
          path: typescript-sdk/
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      
      - name: Publish to npm (with tag)
        run: |
          cd typescript-sdk
          npm publish --tag next --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm:
    needs: [build]
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[release]'))
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@dispersl/sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: typescript-dist
          path: typescript-sdk/
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      
      - name: Publish to npm
        run: |
          cd typescript-sdk
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
