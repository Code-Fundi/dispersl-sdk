openapi: 3.0.0
info:
  title: Dispersl API
  version: 0.1.0
  description: |
    Comprehensive API documentation for Dispersl API, an agentic workflow platform for AI-driven software development. All endpoints require Bearer token authentication unless otherwise noted.
servers:
  - url: https://api.dispersl.com/v1
    description: Production server

tags:
  - name: Agents
    description: Core AI operations for planning, chat, and building
  - name: Models
    description: LLM model management
  - name: Authentication
    description: API key management
  - name: Task Management
    description: Task lifecycle management
  - name: Step Management
    description: Task step operations
  - name: History
    description: Task and step history tracking

paths:
  # Agents
  /agent/chat:
    post:
      tags:
        - Agents
      summary: Chat with AI to understand internal codebase insights, task progress and documentation
      description: Handles chat interactions with the AI model.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: NDJSON stream of chat response
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StandardNdjsonResponse'
        '400':
          description: Failed to initialize AI model
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  /agent/plan:
    post:
      tags:
        - Agents
      summary: Multi-agent task dispersion
      description: Distributes a complex task across multiple specialized AI agents following SDLC principles.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DisperseRequest'
      responses:
        '200':
          description: NDJSON stream of agentic task breakdown and progress
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StandardNdjsonResponse'
        '400':
          description: Invalid agent choices, missing AI model, ongoing task, or team limit reached
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  /agent/code:
    post:
      tags:
        - Agents
      summary: Code generation with agentic flow and tool execution
      description: Generates and builds code based on the provided prompt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildRequest'
      responses:
        '200':
          description: NDJSON stream of code generation response
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StandardNdjsonResponse'
        '400':
          description: Failed to initialize AI model
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  /agent/test:
    post:
      tags:
        - Agents
      summary: Test generation with agentic flow and tool execution
      description: Generates and builds tests based on the provided prompt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildRequest'
      responses:
        '200':
          description: NDJSON stream of test generation response
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StandardNdjsonResponse'
        '400':
          description: Failed to initialize AI model
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  /agent/git:
    post:
      tags:
        - Agents
      summary: Git versioning with agentic flow and tool execution
      description: Handles Git versioning operations.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildRequest'
      responses:
        '200':
          description: NDJSON stream of git operation response
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StandardNdjsonResponse'
        '400':
          description: Failed to initialize AI model
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  /agent/document/repo:
    post:
      tags:
        - Agents
      summary: Generate end to end documentation for a repository with agentic flow and tool execution
      description: Generates documentation for a repository.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepoDocsRequest'
      responses:
        '200':
          description: NDJSON stream of documentation generation response
          content:
            application/x-ndjson:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardNdjsonResponse'
                  - type: object
                    properties:
                      metadata:
                        type: object
                        properties:
                          tokens:
                            type: integer
                          filesProcessed:
                            type: integer
        '400':
          description: Missing repo values, failed to initialize AI model, or team limit reached
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  # Models
  /models:
    get:
      tags:
        - Models
      summary: List available AI models
      description: Lists all available AI models with their specifications.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to initialize AI model
        '500':
          description: Internal server error

  # Authentication
  /keys:
    get:
      tags:
        - Authentication
      summary: Get API keys
      description: Retrieves API keys for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeysResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to initialize AI model
        '500':
          description: Internal server error

  /keys/new:
    post:
      tags:
        - Authentication
      summary: Generate new API key
      description: Generates new API key pair.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: The user ID for which to generate the API key
                name:
                  type: string
                  description: Optional name for the API key
              required: [user_id]
      responses:
        '200':
          description: API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewAPIKeyResponse'
        '400':
          description: Invalid user ID or API key generation failed
        '401':
          description: No Bearer token provided
        '500':
          description: Internal server error

  # Task Management
  /tasks/new:
    post:
      tags:
        - Task Management
      summary: Create a new task
      description: Creates a new task for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /tasks/{id}/edit:
    post:
      tags:
        - Task Management
      summary: Edit a task by ID
      description: Edits a specific task by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Task edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /tasks:
    get:
      tags:
        - Task Management
      summary: Get all tasks
      description: Retrieves all tasks for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /tasks/{id}:
    get:
      tags:
        - Task Management
      summary: Get a task by ID
      description: Retrieves a specific task by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error
    
  /tasks/{id}/delete:
    delete:
      tags:
        - Task Management
      summary: Cancel a task by ID
      description: Deletes a specific task by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  # Step Management
  /steps/task/{id}:
    get:
      tags:
        - Step Management
      summary: Get a step by Task ID
      description: Retrieves a specific step by its Task ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Step retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /steps/{id}:
    get:
      tags:
        - Step Management
      summary: Get a step by ID
      description: Retrieves a specific step by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Step retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /steps/{id}/delete:
    delete:
      tags:
        - Step Management
      summary: Cancel a step by ID
      description: Deletes a specific step by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Step deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  # History
  /history/task{id}:
    get:
      tags:
        - History
      summary: Get task history by ID
      description: Retrieves the history for a specific task by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
      responses:
        '200':
          description: Task history retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

  /history/step/{id}:
    get:
      tags:
        - History
      summary: Get step history by ID
      description: Retrieves the history for a specific step by its ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
      responses:
        '200':
          description: Step history retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
        '401':
          description: No Bearer token provided
        '400':
          description: Failed to verify api_key or token
        '500':
          description: Internal server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DisperseRequest:
      type: object
      properties:
        prompt:
          type: string
        model:
          type: string
        agent_name:
          type: string
        context:
          type: string
        task_id:
          type: string
        knowledge:
          type: string
        os:
          type: string
        default_dir:
          type: string
        current_dir:
          type: string
        memory:
          type: boolean
      required: [prompt]
    ChatRequest:
      type: object
      properties:
        prompt:
          type: string
        model:
          type: string
        context:
          type: string
        memory:
          type: boolean
        voice:
          type: boolean
        task_id:
          type: string
        knowledge:
          type: string
        os:
          type: string
        default_dir:
          type: string
        current_dir:
          type: string
        mcp:
          type: object
      required: [prompt]
    BuildRequest:
      type: object
      properties:
        prompt:
          type: string
        model:
          type: string
        context:
          type: string
        task_id:
          type: string
        knowledge:
          type: string
        os:
          type: string
        default_dir:
          type: string
        current_dir:
          type: string
        mcp:
          type: object
      required: [prompt]
    RepoDocsRequest:
      type: object
      properties:
        url:
          type: string
        branch:
          type: string
        model:
          type: string
        team_access:
          type: boolean
        task_id:
          type: string
      required: [url, branch]
    ModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              context_length:
                type: integer
              tier_requirements:
                type: object
                properties:
                  free_model:
                    type: boolean
        status:
          type: string
    APIKeysResponse:
      type: object
      properties:
        apiKeys:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              publicKey:
                type: string
              created_at:
                type: string
    NewAPIKeyResponse:
      type: object
      properties:
        publicKey:
          type: string
        message:
          type: string
    TaskResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              status:
                type: string
              created_at:
                type: string
              updated_at:
                type: string
    StepResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              task_id:
                type: string
              name:
                type: string
              status:
                type: string
              created_at:
                type: string
              updated_at:
                type: string
    StatsResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: object
    HistoryResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              event:
                type: string
              timestamp:
                type: string
              details:
                type: object
    StandardNdjsonResponse:
      type: object
      description: >
        Standard NDJSON streaming response. Each line is a JSON object with one of the following types:
        - Text Content: status=processing, message, content
        - Reasoning: status=processing, message, content
        - Tool Calls: status=processing, message, tools
        - Knowledge Sources: status=processing, message, knowledge
        - Audio: status=processing, message, audio
        - Final Audio URL: status=processing, message, audio
        - Completion: status=complete, message, metadata
        - Error: status=error, message, error
      properties:
        status:
          type: string
          enum: [processing, complete, error]
          description: Status of the chunk (processing, complete, or error)
        message:
          type: string
          description: Description of the chunk
        content:
          type: string
          description: Text content (for text or reasoning chunks)         
        knowledge:
          type: array
          items:
            type: string
          description: Knowledge source IDs
        tools:
          type: array
          items:
            type: object
          description: Tool call data
        audio:
          type: string
          description: Base64-encoded audio chunk or final audio URL
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
          description: Error details
        metadata:
          type: object
          properties:
            tokens:
              type: integer
            cost:
              type: number
            language:
              type: string
            filesProcessed:
              type: integer
          description: Metadata for completion chunks
      examples:
        text:
          summary: Text Content
          value:
            status: processing
            message: Content chunk
            content: Generated text...
        reasoning:
          summary: Reasoning
          value:
            status: processing
            message: Reasoning chunk
            content: AI reasoning...
        tool:
          summary: Tool Calls
          value:
            status: processing
            message: Tool calls
            tools:
              - function:
                  name: write_to_file
                  arguments: '{"path":"package.json","content":"..."}'
        knowledge:
          summary: Knowledge Sources
          value:
            status: processing
            message: Knowledge sources
            knowledge:
              - source_id_1
              - source_id_2
        audio:
          summary: Audio Chunk
          value:
            status: processing
            message: Audio chunk
            audio: base64_encoded_audio
        final_audio:
          summary: Final Audio URL
          value:
            status: processing
            message: Final audio URL
            audio: https://storage.example.com/audio/user_123_conv_456.mp3
        complete:
          summary: Completion
          value:
            status: complete
            message: Stream completed
            metadata:
              tokens: 1500
        error:
          summary: Error
          value:
            status: error
            message: Error occurred
            error:
              code: 400
              message: Error description
  tools:
    description: |
      The following tools are available for use by agentic endpoints. Each tool can be invoked by the AI agent as part of the workflow. Tools are referenced in NDJSON responses under the 'tools' property, and their invocation is determined by the agent's reasoning and the endpoint's context. Each tool includes its name, a detailed description, a full JSON schema for its parameters, and a list of endpoints where it is available.
    available:
      execute_command:
        description: "Run a single CLI command that terminates on its own. Used for safe, OS-appropriate command execution."
        parameters:
          type: object
          properties:
            command:
              type: string
              description: "Safe, OS-appropriate CLI command to execute."
          required: [command]
        endpoints:
          - /agent/code
          - /agent/test
      list_files:
        description: "List files and directories in a specified path. Useful for directory exploration and file management."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Directory path to list."
          required: [path]
        endpoints:
          - /agent/code
          - /agent/test
          - /agent/git
      read_file:
        description: "Read the contents of a file. Used for code analysis, test generation, and documentation."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path to read."
          required: [path]
        endpoints:
          - /agent/code
          - /agent/test
          - /agent/git
      write_to_file:
        description: "Write content to a file. Used for code generation and file creation."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path to write to."
            content:
              type: string
              description: "Content to write to the file."
          required: [path, content]
        endpoints:
          - /agent/code
          - /agent/test
      edit_file:
        description: "Edit existing file content. Used for code refactoring and updates."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path to edit."
            content:
              type: string
              description: "New file content."
          required: [path, content]
        endpoints:
          - /agent/code
          - /agent/test
      detect_test_frameworks:
        description: "Scan a directory for test frameworks. Used to identify and configure test environments."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Directory path to scan."
          required: [path]
        endpoints:
          - /agent/test
      write_test_file:
        description: "Generate a test code file. Used for automated test creation."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Test file path."
            content:
              type: string
              description: "Test code content."
          required: [path, content]
        endpoints:
          - /agent/test
      setup_branch_environment:
        description: "Initialize a new branch environment for Git operations."
        parameters:
          type: object
          properties:
            command:
              type: string
              description: "Git checkout command."
          required: [command]
        endpoints:
          - /agent/git
      execute_git_command:
        description: "Execute arbitrary Git commands for advanced version control."
        parameters:
          type: object
          properties:
            command:
              type: string
              description: "Git command to execute."
          required: [command]
        endpoints:
          - /agent/git
      git_status:
        description: "Get the current status of the Git repository."
        parameters:
          type: object
          properties: {}
        endpoints:
          - /agent/git
      git_diff:
        description: "Get the diff of changes in the Git repository."
        parameters:
          type: object
          properties: {}
        endpoints:
          - /agent/git
      git_add:
        description: "Stage changes in the Git repository."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "Path to add to staging. Optional; defaults to all."
          required: []
        endpoints:
          - /agent/git
      git_branch:
        description: "Manage branches in the Git repository (create, delete, list)."
        parameters:
          type: object
          properties:
            action:
              type: string
              enum: [create, delete, list]
              description: "Branch action to perform."
            name:
              type: string
              description: "Branch name (for create/delete)."
          required: [action]
        endpoints:
          - /agent/git
      git_log:
        description: "View commit history in the Git repository."
        parameters:
          type: object
          properties:
            limit:
              type: integer
              description: "Number of commits to show. Optional."
            path:
              type: string
              description: "File path to filter log. Optional."
          required: []
        endpoints:
          - /agent/git
      git_repo_info:
        description: "Get metadata about the Git repository."
        parameters:
          type: object
          properties: {}
        endpoints:
          - /agent/git
      edit_git_infra_file:
        description: "Manage Git infrastructure files, such as CI/CD configs."
        parameters:
          type: object
          properties:
            path:
              type: string
              description: "File path to edit."
            content:
              type: string
              description: "New file content."
          required: [path, content]
        endpoints:
          - /agent/git